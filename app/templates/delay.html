<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delay Predictor | Zomato Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--red:#E23744;--orange:#FF6B35;--dark:#0d0d0d;--dark3:#1e1e1e;--dark4:#252525;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#8a8a8a;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(13,13,13,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
    .nav-logo{font-size:1.2rem;font-weight:800;color:#fff;text-decoration:none;}
    .nav-logo span{color:var(--red);}
    .back-btn{color:var(--muted);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .back-btn:hover{color:#fff;}
    .page{max-width:820px;margin:3rem auto;padding:0 2rem 4rem;}
    .page-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);color:var(--orange);padding:.3rem .85rem;border-radius:2rem;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;}
    h1{font-size:2.3rem;font-weight:800;margin-bottom:.6rem;}
    .sub{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:2rem;}
    .form-card{background:var(--dark3);border:1px solid var(--border);border-radius:1.2rem;padding:2rem;}
    .sec-title{font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:1.4rem 0 .8rem;}
    .sec-title:first-child{margin-top:0;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .fg{display:flex;flex-direction:column;gap:.35rem;}
    .fg label{font-size:.82rem;font-weight:600;}
    .fg input,.fg select{background:var(--dark4);border:1px solid var(--border);color:var(--text);padding:.65rem .9rem;border-radius:.65rem;font-size:.88rem;font-family:'Inter',sans-serif;transition:border-color .2s;}
    .fg input:focus,.fg select:focus{outline:none;border-color:rgba(255,107,53,.5);}
    .submit-btn{width:100%;margin-top:1.5rem;background:linear-gradient(135deg,var(--orange),#e55b20);color:#fff;border:none;padding:.95rem;border-radius:.85rem;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;}
    .submit-btn:hover{opacity:.9;transform:translateY(-1px);}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .result-card{margin-top:1.5rem;background:var(--dark4);border:1px solid var(--border);border-radius:1.2rem;padding:1.8rem;display:none;}
    .result-card.show{display:block;animation:fadeIn .4s ease;}
    .res-title{font-size:1.4rem;font-weight:800;margin-bottom:.4rem;}
    .res-sub{font-size:.88rem;color:var(--muted);}
    .prob-wrap{margin:1.2rem 0;}
    .prob-lbl{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:.4rem;}
    .prob-bar{height:10px;background:var(--dark3);border-radius:5px;overflow:hidden;}
    .prob-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--orange),var(--red));transition:width 1s ease;}
    .res-msg{background:var(--dark3);border-radius:.7rem;padding:1rem 1.2rem;font-size:.9rem;line-height:1.6;margin-top:1rem;border-left:3px solid var(--orange);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">🍕 <span>Zomato</span> Analytics</a>
  <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
</nav>
<div class="page">
  <div class="page-badge"><i class="fas fa-motorcycle"></i> ML Prediction</div>
  <h1>🚴 Delivery Delay Predictor</h1>
  <p class="sub">Uses a <strong>Gradient Boosting model</strong> (10 features) to predict if an order will arrive late — accounting for distance, peak hours, city, and order size.</p>

  <div class="form-card">
    <form id="delayForm">
      <div class="sec-title">📍 Order & Delivery Details</div>
      <div class="grid">
        <div class="fg">
          <label>Distance (km)</label>
          <input type="number" id="distance_km" value="4.5" step="0.1" min="0.5" max="30"/>
        </div>
        <div class="fg">
          <label>Estimated Time (minutes)</label>
          <input type="number" id="estimated_time_min" value="35" min="5"/>
        </div>
        <div class="fg">
          <label>Order Amount (₹)</label>
          <input type="number" id="final_amount" value="420" min="20"/>
        </div>
        <div class="fg">
          <label>Number of Items</label>
          <input type="number" id="items_count" value="3" min="1"/>
        </div>
        <div class="fg">
          <label>Hour of Day (0–23)</label>
          <input type="number" id="order_hour" value="20" min="0" max="23"/>
        </div>
        <div class="fg">
          <label>Price Range (1–4)</label>
          <input type="number" id="price_range" value="2" min="1" max="4"/>
        </div>
      </div>

      <div class="sec-title">🏙️ Context Flags</div>
      <div class="grid">
        <div class="fg">
          <label>Peak Hour?</label>
          <select id="is_peak_hour">
            <option value="1">Yes (Lunch 12–2 PM / Dinner 7–10 PM)</option>
            <option value="0">No (Off-peak)</option>
          </select>
        </div>
        <div class="fg">
          <label>Weekend?</label>
          <select id="is_weekend">
            <option value="1">Yes (Sat/Sun)</option>
            <option value="0">No (Weekday)</option>
          </select>
        </div>
        <div class="fg">
          <label>City</label>
          <select id="city_enc">
            <option value="0">Bengaluru</option>
            <option value="1">Mumbai</option>
            <option value="2">Delhi NCR</option>
            <option value="3">Hyderabad</option>
            <option value="4">Chennai</option>
            <option value="5">Pune</option>
            <option value="6">Kolkata</option>
            <option value="7">Ahmedabad</option>
          </select>
        </div>
        <div class="fg">
          <label>Restaurant Type</label>
          <select id="rest_type_enc">
            <option value="0">Quick Service (QSR)</option>
            <option value="1">Casual Dining</option>
            <option value="2">Cloud Kitchen</option>
            <option value="3">Fine Dining</option>
            <option value="4">Bakery / Café</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-bolt"></i> Predict Delivery Delay
      </button>
    </form>

    <div class="result-card" id="resultCard">
      <div class="res-title" id="resTitle">—</div>
      <div class="res-sub" id="resSub">—</div>
      <div class="prob-wrap">
        <div class="prob-lbl"><span>Delay Probability</span><span id="probPct">—</span></div>
        <div class="prob-bar"><div class="prob-fill" id="probFill" style="width:0%"></div></div>
      </div>
      <div class="res-msg" id="resMsg">—</div>
    </div>
  </div>
</div>

<script>
  document.getElementById('delayForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Predicting...';
    const payload = {
      distance_km:      +document.getElementById('distance_km').value,
      estimated_time_min:+document.getElementById('estimated_time_min').value,
      is_peak_hour:     +document.getElementById('is_peak_hour').value,
      is_weekend:       +document.getElementById('is_weekend').value,
      order_hour:       +document.getElementById('order_hour').value,
      final_amount:     +document.getElementById('final_amount').value,
      items_count:      +document.getElementById('items_count').value,
      city_enc:         +document.getElementById('city_enc').value,
      rest_type_enc:    +document.getElementById('rest_type_enc').value,
      price_range:      +document.getElementById('price_range').value,
    };
    try {
      const res = await fetch('/predict/delay', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      const card = document.getElementById('resultCard');
      card.classList.add('show');
      const p = data.probability;
      document.getElementById('resTitle').textContent = data.prediction ? '⚠️ Likely Delayed' : '✅ On Time';
      document.getElementById('resSub').textContent = `Delay probability: ${p}%`;
      document.getElementById('probPct').textContent = p + '%';
      document.getElementById('resMsg').textContent = data.message;
      setTimeout(() => { document.getElementById('probFill').style.width = p + '%'; }, 100);
    } catch(err) { alert('Error: '+err.message); }
    finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-bolt"></i> Predict Delivery Delay'; }
  });
</script>
</body>
</html>
